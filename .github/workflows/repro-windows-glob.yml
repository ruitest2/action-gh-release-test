name: repro-windows-glob
run-name: repro-windows-glob-${{ inputs.action_ref }}

on:
  workflow_dispatch:
    inputs:
      action_repository:
        description: Action repository to check out
        required: true
        default: softprops/action-gh-release
      action_ref:
        description: Action ref to test
        required: true
        default: v2.6.0

permissions:
  contents: write

jobs:
  repro:
    runs-on: windows-latest
    env:
      TAG_NAME: v280.${{ github.run_id }}.${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.action_repository }}
          ref: ${{ inputs.action_ref }}
          path: action-under-test

      - name: Prepare Windows files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets | Out-Null
          Set-Content -Path release-assets\\rssguard-win7.exe -Value "win7 exe"
          Set-Content -Path release-assets\\rssguard-win7.7z -Value "win7 archive"

      - name: Attempt release with Windows-style globs
        id: release
        continue-on-error: true
        uses: ./action-under-test
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            .\release-assets\rssguard-*win7.exe
            .\release-assets\rssguard-*win7.7z

      - name: Assert Windows globs matched assets
        if: always()
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
          RELEASE_OUTCOME: ${{ steps.release.outcome }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            let release = null;
            try {
              const response = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: process.env.TAG_NAME,
              });
              release = response.data;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }
            const assetNames = release?.assets.map((asset) => asset.name) ?? [];
            const summary = {
              tag_name: process.env.TAG_NAME,
              step_outcome: process.env.RELEASE_OUTCOME,
              asset_names: assetNames,
            };

            core.summary
              .addHeading("Windows glob summary")
              .addCodeBlock(JSON.stringify(summary, null, 2), "json")
              .write();

            if (
              !assetNames.includes("rssguard-win7.exe") ||
              !assetNames.includes("rssguard-win7.7z")
            ) {
              core.setFailed("Windows-style file globs did not upload both expected assets");
            }

      - name: Cleanup release and tag
        if: always()
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: process.env.TAG_NAME,
              });
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.id,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }
            try {
              await github.request("DELETE /repos/{owner}/{repo}/git/refs/{ref}", {
                owner,
                repo,
                ref: `tags/${process.env.TAG_NAME}`,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }
