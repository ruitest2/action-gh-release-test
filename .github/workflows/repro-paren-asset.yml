name: repro-paren-asset
run-name: repro-paren-asset-${{ inputs.action_ref }}

on:
  workflow_dispatch:
    inputs:
      action_repository:
        description: Action repository to check out
        required: true
        default: softprops/action-gh-release
      action_ref:
        description: Action ref to test
        required: true
        default: v2.6.0

permissions:
  contents: write

jobs:
  repro:
    runs-on: windows-latest
    env:
      TAG_NAME: v393.${{ github.run_id }}.${{ github.run_attempt }}
      ASSET_NAME: appName(x64)_1.0.0.${{ github.run_attempt }}.msi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.action_repository }}
          ref: ${{ inputs.action_ref }}
          path: action-under-test

      - name: Prepare paren asset
        shell: pwsh
        run: |
          Set-Content -Path $env:ASSET_NAME -Value "paren repro $env:TAG_NAME"

      - name: Attempt release
        id: release
        continue-on-error: true
        uses: ./action-under-test
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: ${{ env.ASSET_NAME }}

      - name: Assert filename stayed intact
        if: always()
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
          ASSET_NAME: ${{ env.ASSET_NAME }}
          RELEASE_OUTCOME: ${{ steps.release.outcome }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag: process.env.TAG_NAME,
            });
            const assetSummaries = release.assets.map((asset) => ({
              id: asset.id,
              name: asset.name,
              label: asset.label,
            }));
            const summary = {
              tag_name: process.env.TAG_NAME,
              step_outcome: process.env.RELEASE_OUTCOME,
              assets: assetSummaries,
            };
            console.log(JSON.stringify(summary));

            core.summary
              .addHeading("Paren asset summary")
              .addCodeBlock(JSON.stringify(summary, null, 2), "json")
              .write();

            const matchingAsset = release.assets.find((asset) => asset.label === process.env.ASSET_NAME);
            if (!matchingAsset) {
              core.setFailed("asset label with parentheses was not restored");
              return;
            }

            if (matchingAsset.name !== process.env.ASSET_NAME) {
              core.setFailed("asset download name with parentheses was normalized or changed");
            }

      - name: Cleanup release and tag
        if: always()
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: process.env.TAG_NAME,
              });
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.id,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }
            try {
              await github.request("DELETE /repos/{owner}/{repo}/git/refs/{ref}", {
                owner,
                repo,
                ref: `tags/${process.env.TAG_NAME}`,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }
