name: repro-release-discussion
run-name: >-
  repro-release-discussion-${{ inputs.action_ref }}-${{ inputs.expected_discussion }}

on:
  workflow_dispatch:
    inputs:
      action_repository:
        description: Action repository to check out
        required: true
        default: softprops/action-gh-release
      action_ref:
        description: Action ref to test
        required: true
        default: v2.6.1
      expected_discussion:
        description: Whether the created release is expected to have a linked discussion
        required: true
        type: choice
        options:
          - present
          - absent
        default: absent

permissions:
  contents: write
  discussions: write

jobs:
  repro:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: v764.${{ github.run_id }}.${{ github.run_attempt }}
    steps:
      - name: Check out harness
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check out action under test
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ inputs.action_repository }}
          ref: ${{ inputs.action_ref }}
          path: action-under-test

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          printf 'discussion repro asset %s\n' "$TAG_NAME" > release-assets/discussion.txt
          cat > release-notes.md <<EOF
          Discussion repro for $TAG_NAME
          EOF

      - name: Create release with discussion category
        id: release
        uses: ./action-under-test
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Discussion repro ${{ env.TAG_NAME }}
          discussion_category_name: Announcements
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: release-assets/*

      - name: Assert linked discussion behavior
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          EXPECTED_DISCUSSION: ${{ inputs.expected_discussion }}
          RELEASE_OUTCOME: ${{ steps.release.outcome }}
          RELEASE_URL: ${{ steps.release.outputs.url }}
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ github.token }}
          script: |
            const {
              getReleaseByTagOrNull,
              writeJsonSummary,
            } = require(`${process.env.GITHUB_WORKSPACE}/scripts/release-harness.js`);
            const { owner, repo } = context.repo;
            const tagName = process.env.TAG_NAME;
            const release = await getReleaseByTagOrNull({ github, owner, repo, tag: tagName });
            const expected = process.env.EXPECTED_DISCUSSION;
            const discussionPresent = Boolean(release?.discussion_url);

            await writeJsonSummary(core, "Discussion repro summary", {
              tag_name: tagName,
              action_ref: "${{ inputs.action_ref }}",
              expected_discussion: expected,
              step_outcome: process.env.RELEASE_OUTCOME,
              output_release_url: process.env.RELEASE_URL,
              observed_release_id: release?.id ?? null,
              observed_release_url: release?.html_url ?? null,
              observed_discussion_url: release?.discussion_url ?? null,
              asset_names: release?.assets.map((asset) => asset.name) ?? [],
            });

            if (process.env.RELEASE_OUTCOME !== "success") {
              core.setFailed("action did not create the release successfully");
              return;
            }

            if (!release) {
              core.setFailed(`no release found for ${tagName}`);
              return;
            }

            if (expected === "present" && !discussionPresent) {
              core.setFailed("expected a linked discussion, but release.discussion_url was empty");
              return;
            }

            if (expected === "absent" && discussionPresent) {
              core.setFailed(
                `expected no linked discussion, but found ${release.discussion_url}`,
              );
            }

      - name: Cleanup release, tag, and linked discussion
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          OUTPUT_RELEASE_ID: ${{ steps.release.outputs.id }}
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ github.token }}
          script: |
            const {
              deleteTagIfExists,
            } = require(`${process.env.GITHUB_WORKSPACE}/scripts/release-harness.js`);
            const { owner, repo } = context.repo;
            const listMatches = async () => {
              const releases = await github.paginate(github.rest.repos.listReleases, {
                owner,
                repo,
                per_page: 100,
              });
              return releases.filter(
                (release) => release.tag_name === process.env.TAG_NAME,
              );
            };
            let matches = await listMatches();
            for (let attempt = 1; matches.length === 0 && attempt <= 5; attempt += 1) {
              await new Promise((resolve) => setTimeout(resolve, 1000));
              matches = await listMatches();
            }
            const discussionUrls = new Set(
              matches.map((release) => release.discussion_url).filter(Boolean),
            );

            const releaseIds = new Set(matches.map((release) => release.id));
            if (process.env.OUTPUT_RELEASE_ID) {
              releaseIds.add(Number(process.env.OUTPUT_RELEASE_ID));
            }
            for (const releaseId of releaseIds) {
              try {
                await github.rest.repos.deleteRelease({
                  owner,
                  repo,
                  release_id: releaseId,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }
            await deleteTagIfExists({
              github,
              owner,
              repo,
              tag: process.env.TAG_NAME,
            });

            if (discussionUrls.size > 0) {
              const result = await github.graphql(
                `query($owner: String!, $repo: String!) {
                  repository(owner: $owner, name: $repo) {
                    discussions(first: 100) {
                      nodes { id url }
                    }
                  }
                }`,
                { owner, repo },
              );
              for (const discussion of result.repository.discussions.nodes) {
                if (discussionUrls.has(discussion.url)) {
                  await github.graphql(
                    `mutation($id: ID!) {
                      deleteDiscussion(input: {id: $id}) { clientMutationId }
                    }`,
                    { id: discussion.id },
                  );
                }
              }
            }

            let remaining = await listMatches();
            for (let attempt = 1; remaining.length > 0 && attempt <= 5; attempt += 1) {
              await new Promise((resolve) => setTimeout(resolve, 1000));
              remaining = await listMatches();
            }
            if (remaining.length > 0) {
              core.setFailed(`release cleanup failed for ${process.env.TAG_NAME}`);
            }
