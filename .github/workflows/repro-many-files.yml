name: repro-many-files
run-name: repro-many-files-${{ inputs.action_ref }}

on:
  workflow_dispatch:
    inputs:
      action_repository:
        description: Action repository to check out
        required: true
        default: softprops/action-gh-release
      action_ref:
        description: Action ref to test
        required: true
        default: master

permissions:
  contents: write

jobs:
  repro:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: v335.${{ github.run_id }}.${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.action_repository }}
          ref: ${{ inputs.action_ref }}
          path: action-under-test

      - name: Prepare many assets
        run: |
          mkdir many-files
          for i in $(seq 1 105); do
            printf 'file %s for %s\n' "$i" "$TAG_NAME" > "many-files/file-$i.txt"
          done

      - name: Attempt release with many assets
        id: release
        continue-on-error: true
        uses: ./action-under-test
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Many files repro ${{ env.TAG_NAME }}
          files: many-files/*.txt

      - name: Assert all assets uploaded
        if: always()
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
          RELEASE_OUTCOME: ${{ steps.release.outcome }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag: process.env.TAG_NAME,
            });
            const assetNames = release.assets.map((asset) => asset.name);
            const summary = {
              tag_name: process.env.TAG_NAME,
              step_outcome: process.env.RELEASE_OUTCOME,
              asset_count: assetNames.length,
              first_assets: assetNames.slice(0, 10),
              last_assets: assetNames.slice(-10),
            };

            core.summary
              .addHeading("Many files summary")
              .addCodeBlock(JSON.stringify(summary, null, 2), "json")
              .write();

            if (assetNames.length !== 105) {
              core.setFailed("did not upload all 105 assets");
            }

      - name: Cleanup release and tag
        if: always()
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: process.env.TAG_NAME,
              });
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.id,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }
            try {
              await github.request("DELETE /repos/{owner}/{repo}/git/refs/{ref}", {
                owner,
                repo,
                ref: `tags/${process.env.TAG_NAME}`,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }
