name: repro-duplicate-asset
run-name: repro-duplicate-asset-${{ inputs.action_ref }}

on:
  workflow_dispatch:
    inputs:
      action_repository:
        description: Action repository to check out
        required: true
        default: softprops/action-gh-release
      action_ref:
        description: Action ref to test
        required: true
        default: v2.6.0
      asset_name:
        description: Asset filename to upload concurrently
        required: true
        default: shared.txt
      expected_display_name:
        description: Expected displayed asset name after upload
        required: true
        default: shared.txt

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      barrier_epoch: ${{ steps.vars.outputs.barrier_epoch }}
      tag_name: ${{ steps.vars.outputs.tag_name }}
    steps:
      - id: vars
        run: |
          echo "tag_name=v740.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
          echo "barrier_epoch=$(( $(date +%s) + 45 ))" >> "$GITHUB_OUTPUT"

  uploader:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        slot: [1, 2]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.action_repository }}
          ref: ${{ inputs.action_ref }}
          path: action-under-test

      - name: Prepare shared asset
        env:
          ASSET_NAME: ${{ inputs.asset_name }}
        run: |
          printf 'shared asset from worker %s for %s\n' "${{ matrix.slot }}" "${{ needs.prepare.outputs.tag_name }}" > "$ASSET_NAME"

      - name: Wait for barrier
        env:
          BARRIER_EPOCH: ${{ needs.prepare.outputs.barrier_epoch }}
        run: |
          while [ "$(date +%s)" -lt "$BARRIER_EPOCH" ]; do
            sleep 1
          done

      - name: Attempt release update
        id: release
        continue-on-error: true
        uses: ./action-under-test
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: Duplicate asset repro ${{ needs.prepare.outputs.tag_name }}
          files: ${{ inputs.asset_name }}

      - name: Persist worker outcome
        if: always()
        run: |
          cat <<'EOF' > "uploader-${{ matrix.slot }}.json"
          {
            "slot": ${{ matrix.slot }},
            "tag_name": "${{ needs.prepare.outputs.tag_name }}",
            "outcome": "${{ steps.release.outcome }}"
          }
          EOF

      - name: Upload worker outcome
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: uploader-${{ matrix.slot }}
          path: uploader-${{ matrix.slot }}.json

  inspect:
    if: always()
    needs:
      - prepare
      - uploader
    runs-on: ubuntu-latest
    steps:
      - name: Download worker outcomes
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: uploader-results
          pattern: uploader-*

      - name: Summarize duplicate asset attempt
        uses: actions/github-script@v8
        env:
          EXPECTED_DISPLAY_NAME: ${{ inputs.expected_display_name }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");
            const path = require("path");
            const { owner, repo } = context.repo;
            const tagName = process.env.TAG_NAME;
            const resultDir = path.join(process.env.GITHUB_WORKSPACE, "uploader-results");
            const uploaderResults = fs.existsSync(resultDir)
              ? fs.readdirSync(resultDir)
                  .filter((file) => file.endsWith(".json"))
                  .sort()
                  .map((file) => JSON.parse(fs.readFileSync(path.join(resultDir, file), "utf8")))
              : [];
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag: tagName,
            });
            const displayedAssetNames = release.assets.map((asset) => asset.label || asset.name);
            const expectedDisplayName = process.env.EXPECTED_DISPLAY_NAME;
            const allSucceeded = uploaderResults.every((result) => result.outcome === "success");

            const summary = {
              tag_name: tagName,
              uploader_results: uploaderResults,
              displayed_asset_names: displayedAssetNames,
              asset_names: release.assets.map((asset) => asset.name),
            };

            core.summary
              .addHeading("Duplicate asset summary")
              .addCodeBlock(JSON.stringify(summary, null, 2), "json")
              .write();

            if (!allSucceeded) {
              core.setFailed("expected both concurrent uploaders to succeed");
              return;
            }

            if (release.assets.length !== 1) {
              core.setFailed(`expected exactly one release asset, found ${release.assets.length}`);
              return;
            }

            if (!displayedAssetNames.includes(expectedDisplayName)) {
              core.setFailed(`expected displayed asset ${expectedDisplayName}`);
            }
