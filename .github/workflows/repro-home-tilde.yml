name: repro-path-resolution
run-name: repro-path-resolution-${{ inputs.action_ref }}-${{ inputs.path_case }}

on:
  workflow_dispatch:
    inputs:
      action_repository:
        description: Action repository to check out
        required: true
        default: softprops/action-gh-release
      action_ref:
        description: Action ref to test
        required: true
        default: v2.6.0
      path_case:
        description: Path-resolution case to verify
        required: true
        type: choice
        options:
          - home-tilde
          - working-directory
        default: home-tilde

permissions:
  contents: write

jobs:
  repro:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: vpath.${{ github.run_id }}.${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.action_repository }}
          ref: ${{ inputs.action_ref }}
          path: action-under-test

      - name: Prepare path resolution asset
        env:
          PATH_CASE: ${{ inputs.path_case }}
        run: |
          case "$PATH_CASE" in
            home-tilde)
              printf 'tilde repro %s\n' "$TAG_NAME" > "$HOME/home-asset.txt"
              ;;
            working-directory)
              mkdir -p release-assets/nested
              printf 'working directory repro %s\n' "$TAG_NAME" > release-assets/nested/workdir-asset.txt
              ;;
            *)
              echo "unsupported path case: $PATH_CASE" >&2
              exit 1
              ;;
          esac

      - name: Attempt release with tilde path
        id: release_home
        if: inputs.path_case == 'home-tilde'
        continue-on-error: true
        uses: ./action-under-test
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Path resolution repro ${{ env.TAG_NAME }}
          files: ~/home-asset.txt

      - name: Attempt release with working_directory
        id: release_working_directory
        if: inputs.path_case == 'working-directory'
        continue-on-error: true
        uses: ./action-under-test
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Path resolution repro ${{ env.TAG_NAME }}
          working_directory: release-assets
          files: nested/workdir-asset.txt

      - name: Assert path resolution asset uploaded
        if: always()
        uses: actions/github-script@v8
        env:
          HOME_OUTCOME: ${{ steps.release_home.outcome }}
          PATH_CASE: ${{ inputs.path_case }}
          WORKDIR_OUTCOME: ${{ steps.release_working_directory.outcome }}
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ github.token }}
          script: |
            const {
              getReleaseByTagOrNull,
              writeJsonSummary,
            } = require(`${process.env.GITHUB_WORKSPACE}/scripts/release-harness.js`);
            const { owner, repo } = context.repo;
            const pathCase = process.env.PATH_CASE;
            const expectedAssetName =
              pathCase === "working-directory" ? "workdir-asset.txt" : "home-asset.txt";
            const releaseOutcome =
              pathCase === "working-directory"
                ? process.env.WORKDIR_OUTCOME
                : process.env.HOME_OUTCOME;
            const release = await getReleaseByTagOrNull({
              github,
              owner,
              repo,
              tag: process.env.TAG_NAME,
            });
            const summary = {
              tag_name: process.env.TAG_NAME,
              path_case: pathCase,
              step_outcome: releaseOutcome,
              release_id: release?.id ?? null,
              asset_names: release?.assets.map((asset) => asset.name) ?? [],
            };

            await writeJsonSummary(core, "Path resolution summary", summary);

            if (releaseOutcome !== "success") {
              core.setFailed(`path-case ${pathCase} did not succeed`);
              return;
            }

            if (!release?.assets.some((asset) => asset.name === expectedAssetName)) {
              core.setFailed(`path-case ${pathCase} did not upload ${expectedAssetName}`);
            }
