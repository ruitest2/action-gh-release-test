name: repro-target-commitish
run-name: repro-target-commitish-${{ inputs.action_ref }}

on:
  workflow_dispatch:
    inputs:
      action_repository:
        description: Action repository to check out
        required: true
        default: softprops/action-gh-release
      action_ref:
        description: Action ref to test
        required: true
        default: v2.6.0

permissions:
  contents: write

jobs:
  repro:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: v411.${{ github.run_id }}.${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.action_repository }}
          ref: ${{ inputs.action_ref }}
          path: action-under-test

      - name: Resolve previous non-workflow commit
        id: previous
        shell: bash
        run: |
          set -euo pipefail
          target_sha=""
          while read -r sha; do
            files="$(git show --pretty=format: --name-only "$sha")"
            if [ -n "$files" ] && ! grep -q '^\.github/workflows/' <<<"$files"; then
              target_sha="$sha"
              break
            fi
          done < <(git rev-list --max-count=50 HEAD)

          if [ -z "$target_sha" ]; then
            echo "failed to find a non-workflow commit in recent history" >&2
            exit 1
          fi

          echo "sha=$target_sha" >> "$GITHUB_OUTPUT"

      - name: Prepare asset
        run: |
          printf 'target commitish repro %s\n' "$TAG_NAME" > target-commitish.txt

      - name: Check direct ref creation against target commitish
        id: direct-ref
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
          TARGET_COMMITISH: ${{ steps.previous.outputs.sha }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const ref = `refs/tags/direct-${process.env.TAG_NAME}`;
            await github.rest.git.createRef({
              owner,
              repo,
              ref,
              sha: process.env.TARGET_COMMITISH,
            });

      - name: Attempt release with non-latest commitish
        id: release
        continue-on-error: true
        uses: ./action-under-test
        with:
          tag_name: ${{ env.TAG_NAME }}
          target_commitish: ${{ steps.previous.outputs.sha }}
          files: target-commitish.txt

      - name: Assert release honored previous commitish
        if: always()
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
          TARGET_COMMITISH: ${{ steps.previous.outputs.sha }}
          DIRECT_REF_OUTCOME: ${{ steps.direct-ref.outcome }}
          RELEASE_OUTCOME: ${{ steps.release.outcome }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            let release = null;
            try {
              const response = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: process.env.TAG_NAME,
              });
              release = response.data;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const summary = {
              tag_name: process.env.TAG_NAME,
              target_commitish: process.env.TARGET_COMMITISH,
              direct_ref_outcome: process.env.DIRECT_REF_OUTCOME,
              step_outcome: process.env.RELEASE_OUTCOME,
              release_id: release?.id ?? null,
              release_target_commitish: release?.target_commitish ?? null,
              asset_names: release?.assets.map((asset) => asset.name) ?? [],
            };
            console.log(JSON.stringify(summary));

            core.summary
              .addHeading("Target commitish summary")
              .addCodeBlock(JSON.stringify(summary, null, 2), "json")
              .write();

            if (
              process.env.RELEASE_OUTCOME !== "success" ||
              !release ||
              release.target_commitish !== process.env.TARGET_COMMITISH ||
              !release.assets.some((asset) => asset.name === "target-commitish.txt")
            ) {
              core.setFailed("non-latest target_commitish did not create the release cleanly");
            }

      - name: Cleanup release and tag
        if: always()
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: process.env.TAG_NAME,
              });
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.id,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }
            try {
              await github.request("DELETE /repos/{owner}/{repo}/git/refs/{ref}", {
                owner,
                repo,
                ref: `tags/direct-${process.env.TAG_NAME}`,
              });
            } catch (error) {
              if (
                error.status !== 404 &&
                !(error.status === 422 && /Reference does not exist/i.test(error.message))
              ) {
                throw error;
              }
            }
            try {
              await github.request("DELETE /repos/{owner}/{repo}/git/refs/{ref}", {
                owner,
                repo,
                ref: `tags/${process.env.TAG_NAME}`,
              });
            } catch (error) {
              if (
                error.status !== 404 &&
                !(error.status === 422 && /Reference does not exist/i.test(error.message))
              ) {
                throw error;
              }
            }
