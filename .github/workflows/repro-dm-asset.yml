name: repro-dm-asset
run-name: repro-dm-asset-${{ inputs.action_ref }}

on:
  workflow_dispatch:
    inputs:
      action_repository:
        description: Action repository to check out
        required: true
        default: softprops/action-gh-release
      action_ref:
        description: Action ref to test
        required: true
        default: v2.6.0

permissions:
  contents: write

jobs:
  repro:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: v434.${{ github.run_id }}.${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.action_repository }}
          ref: ${{ inputs.action_ref }}
          path: action-under-test

      - name: Prepare DexMetadata-style files
        run: |
          mkdir -p release-files
          printf 'apk repro %s\n' "$TAG_NAME" > release-files/app-release.apk
          printf 'dm repro %s\n' "$TAG_NAME" > release-files/app-release.dm

      - name: Attempt release with .dm asset
        id: release
        continue-on-error: true
        uses: ./action-under-test
        with:
          tag_name: ${{ env.TAG_NAME }}
          prerelease: true
          generate_release_notes: true
          files: release-files/*

      - name: Assert .dm asset uploaded cleanly
        if: always()
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
          RELEASE_OUTCOME: ${{ steps.release.outcome }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            let release = null;
            try {
              const response = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: process.env.TAG_NAME,
              });
              release = response.data;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const assetNames = release?.assets.map((asset) => asset.name) ?? [];
            const summary = {
              tag_name: process.env.TAG_NAME,
              step_outcome: process.env.RELEASE_OUTCOME,
              release_id: release?.id ?? null,
              asset_names: assetNames,
            };

            core.summary
              .addHeading("DexMetadata asset summary")
              .addCodeBlock(JSON.stringify(summary, null, 2), "json")
              .write();

            if (
              process.env.RELEASE_OUTCOME !== "success" ||
              !assetNames.includes("app-release.apk") ||
              !assetNames.includes("app-release.dm")
            ) {
              core.setFailed(".dm asset upload did not complete cleanly");
            }

      - name: Cleanup release and tag
        if: always()
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: process.env.TAG_NAME,
              });
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.id,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }
            try {
              await github.request("DELETE /repos/{owner}/{repo}/git/refs/{ref}", {
                owner,
                repo,
                ref: `tags/${process.env.TAG_NAME}`,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }
