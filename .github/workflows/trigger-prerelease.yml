name: trigger-prerelease
run-name: trigger-prerelease-${{ inputs.action_ref }}

on:
  workflow_dispatch:
    inputs:
      action_repository:
        description: Action repository to check out
        required: true
        default: softprops/action-gh-release
      action_ref:
        description: Action ref to test
        required: true
        default: v2.6.0
      expected_prereleased:
        description: Whether the prereleased observer should fire
        required: true
        type: choice
        options:
          - absent
          - ignore
          - present
        default: absent
      expected_published:
        description: Whether the published observer should fire
        required: true
        type: choice
        options:
          - absent
          - ignore
          - present
        default: present

permissions:
  actions: read
  contents: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    env:
      HAS_TRIGGER_TOKEN: ${{ secrets.ACTION_GH_RELEASE_TRIGGER_TOKEN != '' }}
      TAG_NAME: v708.${{ github.run_id }}.${{ github.run_attempt }}-rc.1
    steps:
      - uses: actions/checkout@v5

      - uses: actions/checkout@v5
        with:
          repository: ${{ inputs.action_repository }}
          ref: ${{ inputs.action_ref }}
          path: action-under-test

      - name: Prepare prerelease asset
        run: |
          printf 'prerelease repro %s\n' "$TAG_NAME" > prerelease.txt

      - name: Create prerelease
        uses: ./action-under-test
        with:
          prerelease: true
          tag_name: ${{ env.TAG_NAME }}
          name: Prerelease repro ${{ env.TAG_NAME }}
          token: ${{ secrets.ACTION_GH_RELEASE_TRIGGER_TOKEN || github.token }}
          files: prerelease.txt

      - name: Assert observer workflows
        uses: actions/github-script@v8
        env:
          EXPECTED_PRERELEASED: ${{ inputs.expected_prereleased }}
          EXPECTED_PUBLISHED: ${{ inputs.expected_published }}
          HAS_TRIGGER_TOKEN: ${{ env.HAS_TRIGGER_TOKEN }}
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ github.token }}
          script: |
            const tagName = process.env.TAG_NAME;
            const expectedPrereleased = process.env.EXPECTED_PRERELEASED;
            const expectedPublished = process.env.EXPECTED_PUBLISHED;
            const hasTriggerToken = process.env.HAS_TRIGGER_TOKEN === "true";
            const { owner, repo } = context.repo;

            const findRuns = async (workflowId) => {
              for (let attempt = 0; attempt < 9; attempt += 1) {
                const { data } = await github.rest.actions.listWorkflowRuns({
                  owner,
                  repo,
                  workflow_id: workflowId,
                  event: "release",
                  per_page: 20,
                });
                const matches = data.workflow_runs.filter((run) => {
                  const title = run.display_title || run.name || "";
                  return title.includes(tagName);
                });
                if (matches.length > 0 || attempt === 8) {
                  return matches;
                }
                await new Promise((resolve) => setTimeout(resolve, 10000));
              }
              return [];
            };

            const prereleasedRuns = await findRuns("observe-prereleased.yml");
            const publishedRuns = await findRuns("observe-published.yml");

            const assertRuns = (expected, runs, label) => {
              if (expected === "ignore") {
                return;
              }
              if (expected === "present" && runs.length === 0) {
                core.setFailed(`expected ${label} observer to run for ${tagName}`);
              }
              if (expected === "absent" && runs.length > 0) {
                core.setFailed(`expected ${label} observer to stay idle for ${tagName}`);
              }
            };

            core.summary
              .addHeading("Prerelease observer check")
              .addRaw(`Tag: ${tagName}\n`)
              .addRaw(`Custom trigger token configured: ${hasTriggerToken}\n`)
              .addRaw(`Prereleased observer runs: ${prereleasedRuns.length}\n`)
              .addRaw(`Published observer runs: ${publishedRuns.length}\n`)
              .addCodeBlock(
                JSON.stringify(
                  {
                    prereleased_runs: prereleasedRuns.map((run) => ({
                      id: run.id,
                      status: run.status,
                      conclusion: run.conclusion,
                      display_title: run.display_title,
                    })),
                    published_runs: publishedRuns.map((run) => ({
                      id: run.id,
                      status: run.status,
                      conclusion: run.conclusion,
                      display_title: run.display_title,
                    })),
                  },
                  null,
                  2,
                ),
                "json",
              )
              .write();

            if (!hasTriggerToken && prereleasedRuns.length === 0 && publishedRuns.length === 0) {
              core.setFailed(
                "no ACTION_GH_RELEASE_TRIGGER_TOKEN secret is configured; releases created with GITHUB_TOKEN do not trigger downstream release workflows",
              );
              return;
            }

            assertRuns(expectedPrereleased, prereleasedRuns, "prereleased");
            assertRuns(expectedPublished, publishedRuns, "published");
