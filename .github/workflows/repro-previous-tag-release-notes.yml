name: repro-previous-tag-release-notes
run-name: repro-previous-tag-release-notes-${{ inputs.action_ref }}

on:
  workflow_dispatch:
    inputs:
      action_repository:
        description: Action repository to check out
        required: true
        default: softprops/action-gh-release
      action_ref:
        description: Action ref to test
        required: true
        default: v2.6.0

permissions:
  contents: write

jobs:
  repro:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: v372.${{ github.run_id }}.${{ github.run_attempt }}
      LATEST_TAG_NAME: v372latest.${{ github.run_id }}.${{ github.run_attempt }}
      PREVIOUS_TAG_NAME: v372previous.${{ github.run_id }}.${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 80

      - uses: actions/checkout@v5
        with:
          repository: ${{ inputs.action_repository }}
          ref: ${{ inputs.action_ref }}
          path: action-under-test

      - name: Resolve comparison commits
        id: commits
        shell: bash
        run: |
          set -euo pipefail
          shas=()
          while read -r sha; do
            files="$(git show --pretty=format: --name-only "$sha")"
            if [ -n "$files" ] && ! grep -q '^\.github/workflows/' <<<"$files"; then
              shas+=("$sha")
            fi
            if [ "${#shas[@]}" -ge 3 ]; then
              break
            fi
          done < <(git rev-list --max-count=80 HEAD)

          if [ "${#shas[@]}" -lt 3 ]; then
            echo "failed to find three recent non-workflow commits" >&2
            exit 1
          fi

          {
            echo "current_sha=${shas[0]}"
            echo "latest_sha=${shas[1]}"
            echo "previous_sha=${shas[2]}"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare asset
        run: |
          printf 'previous tag release notes repro %s\n' "$TAG_NAME" > previous-tag-release-notes.txt

      - name: Seed comparison releases
        uses: actions/github-script@v8
        env:
          PREVIOUS_TAG_NAME: ${{ env.PREVIOUS_TAG_NAME }}
          PREVIOUS_SHA: ${{ steps.commits.outputs.previous_sha }}
          LATEST_TAG_NAME: ${{ env.LATEST_TAG_NAME }}
          LATEST_SHA: ${{ steps.commits.outputs.latest_sha }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const createTagAndRelease = async (tag, sha, body) => {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tag}`,
                sha,
              });
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: tag,
                body,
                draft: false,
              });
            };

            await createTagAndRelease(
              process.env.PREVIOUS_TAG_NAME,
              process.env.PREVIOUS_SHA,
              "seeded previous release",
            );
            await createTagAndRelease(
              process.env.LATEST_TAG_NAME,
              process.env.LATEST_SHA,
              "seeded latest release",
            );

      - name: Compute expected release notes bodies
        id: expected
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
          PREVIOUS_TAG_NAME: ${{ env.PREVIOUS_TAG_NAME }}
          LATEST_TAG_NAME: ${{ env.LATEST_TAG_NAME }}
          CURRENT_SHA: ${{ steps.commits.outputs.current_sha }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;

            const getBody = async (previousTagName) => {
              const { data } = await github.rest.repos.generateReleaseNotes({
                owner,
                repo,
                tag_name: process.env.TAG_NAME,
                target_commitish: process.env.CURRENT_SHA,
                previous_tag_name: previousTagName,
              });
              return data.body || "";
            };

            const previousBody = await getBody(process.env.PREVIOUS_TAG_NAME);
            const latestBody = await getBody(process.env.LATEST_TAG_NAME);

            core.summary
              .addHeading("Expected release notes bodies")
              .addCodeBlock(
                JSON.stringify(
                  {
                    tag_name: process.env.TAG_NAME,
                    previous_tag_name: process.env.PREVIOUS_TAG_NAME,
                    latest_tag_name: process.env.LATEST_TAG_NAME,
                    previous_body_preview: previousBody.slice(0, 200),
                    latest_body_preview: latestBody.slice(0, 200),
                  },
                  null,
                  2,
                ),
                "json",
              )
              .write();

            if (!previousBody || !latestBody || previousBody === latestBody) {
              core.setFailed(
                "comparison fixture is not discriminating enough to verify previous_tag behavior",
              );
              return;
            }

            core.setOutput("previous_body_b64", Buffer.from(previousBody, "utf8").toString("base64"));
            core.setOutput("latest_body_b64", Buffer.from(latestBody, "utf8").toString("base64"));

      - name: Attempt release with explicit previous_tag
        id: release
        uses: ./action-under-test
        with:
          tag_name: ${{ env.TAG_NAME }}
          target_commitish: ${{ steps.commits.outputs.current_sha }}
          previous_tag: ${{ env.PREVIOUS_TAG_NAME }}
          generate_release_notes: true
          name: Previous tag release notes repro ${{ env.TAG_NAME }}
          files: previous-tag-release-notes.txt

      - name: Assert release body used explicit previous_tag
        if: always()
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
          RELEASE_OUTCOME: ${{ steps.release.outcome }}
          EXPECTED_PREVIOUS_BODY_B64: ${{ steps.expected.outputs.previous_body_b64 }}
          EXPECTED_LATEST_BODY_B64: ${{ steps.expected.outputs.latest_body_b64 }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag: process.env.TAG_NAME,
            });

            const expectedPreviousBody = Buffer.from(
              process.env.EXPECTED_PREVIOUS_BODY_B64 || "",
              "base64",
            ).toString("utf8");
            const expectedLatestBody = Buffer.from(
              process.env.EXPECTED_LATEST_BODY_B64 || "",
              "base64",
            ).toString("utf8");

            const summary = {
              tag_name: process.env.TAG_NAME,
              step_outcome: process.env.RELEASE_OUTCOME,
              release_id: release.id,
              body_matches_previous: release.body === expectedPreviousBody,
              body_matches_latest: release.body === expectedLatestBody,
              asset_names: release.assets.map((asset) => asset.name),
            };
            console.log(JSON.stringify(summary));

            core.summary
              .addHeading("Previous tag release notes summary")
              .addCodeBlock(JSON.stringify(summary, null, 2), "json")
              .write();

            if (
              process.env.RELEASE_OUTCOME !== "success" ||
              release.body !== expectedPreviousBody ||
              release.body === expectedLatestBody ||
              !release.assets.some((asset) => asset.name === "previous-tag-release-notes.txt")
            ) {
              core.setFailed("release did not honor the explicit previous_tag release notes body");
            }

      - name: Cleanup releases and tags
        if: always()
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
          PREVIOUS_TAG_NAME: ${{ env.PREVIOUS_TAG_NAME }}
          LATEST_TAG_NAME: ${{ env.LATEST_TAG_NAME }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const tags = [
              process.env.TAG_NAME,
              process.env.PREVIOUS_TAG_NAME,
              process.env.LATEST_TAG_NAME,
            ];

            for (const tag of tags) {
              try {
                const { data: release } = await github.rest.repos.getReleaseByTag({
                  owner,
                  repo,
                  tag,
                });
                await github.rest.repos.deleteRelease({
                  owner,
                  repo,
                  release_id: release.id,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }

              try {
                await github.request("DELETE /repos/{owner}/{repo}/git/refs/{ref}", {
                  owner,
                  repo,
                  ref: `tags/${tag}`,
                });
              } catch (error) {
                if (
                  error.status !== 404 &&
                  !(error.status === 422 && /Reference does not exist/i.test(error.message))
                ) {
                  throw error;
                }
              }
            }
