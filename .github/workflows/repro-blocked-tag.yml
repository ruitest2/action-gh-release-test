name: repro-blocked-tag
run-name: repro-blocked-tag-${{ inputs.action_ref }}

on:
  workflow_dispatch:
    inputs:
      action_repository:
        description: Action repository to check out
        required: true
        default: softprops/action-gh-release
      action_ref:
        description: Action ref to test
        required: true
        default: master
      release_repository:
        description: Repository to publish the release into
        required: true
        default: chenrui333/action-gh-release

permissions:
  contents: read

jobs:
  repro:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: v722.${{ github.run_id }}.${{ github.run_attempt }}
      RELEASE_REPOSITORY: ${{ inputs.release_repository }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.action_repository }}
          ref: ${{ inputs.action_ref }}
          path: action-under-test

      - name: Prepare asset
        run: |
          printf 'blocked tag repro for %s\n' "${TAG_NAME}" > blocked-tag.txt

      - name: Create temporary tag ruleset
        id: ruleset
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ACTION_GH_RELEASE_TRIGGER_TOKEN }}
          script: |
            const [owner, repo] = process.env.RELEASE_REPOSITORY.split("/");
            const tagName = process.env.TAG_NAME;
            const { data: ruleset } = await github.request("POST /repos/{owner}/{repo}/rulesets", {
              owner,
              repo,
              name: `temp blocked tag ${tagName}`,
              target: "tag",
              enforcement: "active",
              conditions: {
                ref_name: {
                  include: [`refs/tags/${tagName}`],
                  exclude: [],
                },
              },
              rules: [{ type: "creation" }],
            });
            core.info(`ruleset_id=${ruleset.id}`);
            core.setOutput("ruleset_id", String(ruleset.id));

      - name: Attempt release with blocked tag creation
        id: release
        continue-on-error: true
        uses: ./action-under-test
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Blocked tag repro ${{ env.TAG_NAME }}
          repository: ${{ inputs.release_repository }}
          token: ${{ secrets.ACTION_GH_RELEASE_TRIGGER_TOKEN }}
          files: blocked-tag.txt

      - name: Summarize blocked tag outcome
        id: inspect
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ACTION_GH_RELEASE_TRIGGER_TOKEN }}
          script: |
            const [owner, repo] = process.env.RELEASE_REPOSITORY.split("/");
            const tagName = process.env.TAG_NAME;
            const releaseOutcome = "${{ steps.release.outcome }}";
            let release = null;

            try {
              const response = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: tagName,
              });
              release = response.data;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const summary = {
              tag_name: tagName,
              repository: `${owner}/${repo}`,
              step_outcome: releaseOutcome,
              release: release
                ? {
                    id: release.id,
                    draft: release.draft,
                    prerelease: release.prerelease,
                    published_at: release.published_at,
                    html_url: release.html_url,
                    asset_names: release.assets.map((asset) => asset.name),
                  }
                : null,
            };

            if (release) {
              core.setOutput("release_id", String(release.id));
            }

            core.summary
              .addHeading("Blocked tag repro summary")
              .addCodeBlock(JSON.stringify(summary, null, 2), "json")
              .write();

      - name: Cleanup temporary release and ruleset
        if: always()
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ steps.inspect.outputs.release_id }}
          RULESET_ID: ${{ steps.ruleset.outputs.ruleset_id }}
        with:
          github-token: ${{ secrets.ACTION_GH_RELEASE_TRIGGER_TOKEN }}
          script: |
            const [owner, repo] = process.env.RELEASE_REPOSITORY.split("/");
            const releaseId = process.env.RELEASE_ID;
            const rulesetId = process.env.RULESET_ID;
            const tagName = process.env.TAG_NAME;

            if (releaseId) {
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: Number(releaseId),
              });
              core.info(`deleted release ${releaseId}`);
            }

            try {
              await github.request("DELETE /repos/{owner}/{repo}/git/refs/{ref}", {
                owner,
                repo,
                ref: `tags/${tagName}`,
              });
              core.info(`deleted tag ${tagName}`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            if (rulesetId) {
              await github.request("DELETE /repos/{owner}/{repo}/rulesets/{ruleset_id}", {
                owner,
                repo,
                ruleset_id: Number(rulesetId),
              });
              core.info(`deleted ruleset ${rulesetId}`);
            }
