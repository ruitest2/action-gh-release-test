name: repro-dotfile
run-name: repro-dotfile-${{ inputs.action_ref }}

on:
  workflow_dispatch:
    inputs:
      action_repository:
        description: Action repository to check out
        required: true
        default: softprops/action-gh-release
      action_ref:
        description: Action ref to test
        required: true
        default: v2.6.0
      expected_dotfile_name:
        description: Expected displayed name for .config
        required: true
        default: default.config

permissions:
  contents: write

jobs:
  repro:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: v741.${{ github.run_id }}.${{ github.run_attempt }}1
    steps:
      - uses: actions/checkout@v5

      - uses: actions/checkout@v5
        with:
          repository: ${{ inputs.action_repository }}
          ref: ${{ inputs.action_ref }}
          path: action-under-test

      - name: Prepare assets
        run: |
          printf 'kernel %s\n' "$TAG_NAME" > vmlinux
          printf 'config %s\n' "$TAG_NAME" > .config

      - name: Create release
        uses: ./action-under-test
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Dotfile repro ${{ env.TAG_NAME }}
          files: |
            vmlinux
            .config

      - name: Assert uploaded asset display names
        uses: actions/github-script@v8
        env:
          EXPECTED_DOTFILE_NAME: ${{ inputs.expected_dotfile_name }}
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ github.token }}
          script: |
            const expectedDotfile = process.env.EXPECTED_DOTFILE_NAME;
            const tagName = process.env.TAG_NAME;
            const { owner, repo } = context.repo;
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag: tagName,
            });
            const assetNames = release.assets.map((asset) => asset.name).sort();
            const displayedAssetNames = release.assets
              .map((asset) => asset.label || asset.name)
              .sort();

            core.summary
              .addHeading("Dotfile asset names")
              .addRaw(`Tag: ${tagName}\n`)
              .addRaw("Displayed names:\n")
              .addCodeBlock(JSON.stringify(displayedAssetNames, null, 2), "json")
              .addRaw("Raw API names:\n")
              .addCodeBlock(JSON.stringify(assetNames, null, 2), "json")
              .write();

            if (!displayedAssetNames.includes(expectedDotfile)) {
              core.setFailed(`expected displayed dotfile asset ${expectedDotfile}`);
            }
