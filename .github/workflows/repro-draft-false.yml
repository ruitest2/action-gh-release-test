name: repro-draft-false
run-name: repro-draft-false-${{ inputs.action_ref }}

on:
  workflow_dispatch:
    inputs:
      action_repository:
        description: Action repository to check out
        required: true
        default: softprops/action-gh-release
      action_ref:
        description: Action ref to test
        required: true
        default: v3.0.2
      run_case:
        description: Release lifecycle to exercise
        required: true
        type: choice
        options:
          - all
          - new-prerelease
          - existing-draft
          - retag-existing-release
        default: all
      expected_release_outcome:
        description: Whether the release step should succeed or fail
        required: true
        type: choice
        options:
          - success
          - failure
        default: success
      expected_existing_draft_behavior:
        description: Whether all existing-draft scenarios should satisfy the fixed lifecycle
        required: true
        type: choice
        options:
          - fixed
          - broken
        default: fixed
      expected_retag_behavior:
        description: Expected moving-tag release behavior
        required: true
        type: choice
        options:
          - fixed
          - broken
          - observe
        default: fixed
      retag_iterations:
        description: Number of moving-tag iterations
        required: true
        type: choice
        options:
          - "1"
          - "4"
          - "8"
        default: "1"

permissions:
  contents: write

jobs:
  repro:
    if: inputs.run_case == 'all' || inputs.run_case == 'new-prerelease'
    runs-on: ubuntu-latest
    env:
      TAG_NAME: prerelease-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.action_repository }}
          ref: ${{ inputs.action_ref }}
          path: action-under-test

      - name: Prepare asset
        run: |
          printf 'draft false repro %s\n' "$TAG_NAME" > draft-false.txt

      - name: Attempt release
        id: release
        continue-on-error: true
        uses: ./action-under-test
        with:
          tag_name: ${{ env.TAG_NAME }}
          draft: false
          prerelease: true
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          files: draft-false.txt

      - name: Assert prerelease outcome
        if: always()
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
          RELEASE_OUTCOME: ${{ steps.release.outcome }}
          EXPECTED_RELEASE_OUTCOME: ${{ inputs.expected_release_outcome }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const stepOutcome = process.env.RELEASE_OUTCOME;
            const expectedOutcome = process.env.EXPECTED_RELEASE_OUTCOME;
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag: process.env.TAG_NAME,
            });
            const summary = {
              tag_name: process.env.TAG_NAME,
              expected_outcome: expectedOutcome,
              step_outcome: stepOutcome,
              draft: release.draft,
              prerelease: release.prerelease,
              asset_names: release.assets.map((asset) => asset.name),
            };

            core.summary
              .addHeading("Draft false summary")
              .addCodeBlock(JSON.stringify(summary, null, 2), "json")
              .write();

            if (stepOutcome !== expectedOutcome) {
              core.setFailed(`expected release step outcome ${expectedOutcome}, got ${stepOutcome}`);
              return;
            }

            if (release.draft || !release.prerelease) {
              core.setFailed("release did not stay published as a prerelease");
              return;
            }

            const hasAsset = release.assets.some((asset) => asset.name === "draft-false.txt");
            if (expectedOutcome === "success" && !hasAsset) {
              core.setFailed("expected uploaded asset to be present on the published prerelease");
              return;
            }

            if (expectedOutcome === "failure" && hasAsset) {
              core.setFailed("expected immutable prerelease failure to leave the asset absent");
            }

      - name: Cleanup release and tag
        if: always()
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: process.env.TAG_NAME,
              });
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.id,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }
            try {
              await github.request("DELETE /repos/{owner}/{repo}/git/refs/{ref}", {
                owner,
                repo,
                ref: `tags/${process.env.TAG_NAME}`,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

  existing-draft:
    if: inputs.run_case == 'all' || inputs.run_case == 'existing-draft'
    name: existing draft (${{ matrix.scenario }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - omitted
          - 'null'
          - 'false'
          - 'true'
    env:
      TAG_NAME: issue795-${{ matrix.scenario }}-${{ github.run_id }}-${{ github.run_attempt }}
      ASSET_NAME: issue-795-${{ matrix.scenario }}.txt
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.action_repository }}
          ref: ${{ inputs.action_ref }}
          path: action-under-test

      - name: Prepare scenario asset
        run: |
          printf 'issue 795 %s %s\n' '${{ matrix.scenario }}' "$TAG_NAME" > "$ASSET_NAME"

      - name: Seed draft release
        id: seed
        uses: actions/github-script@v8
        env:
          SCENARIO: ${{ matrix.scenario }}
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const { data: release } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: process.env.TAG_NAME,
              name: `Issue 795 ${process.env.SCENARIO}`,
              target_commitish: context.sha,
              draft: true,
              prerelease: false,
            });
            core.setOutput("release_id", String(release.id));

      - name: Record seeded draft visibility
        id: visibility
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            let directStatus = 200;
            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag: process.env.TAG_NAME });
            } catch (error) {
              directStatus = error.status ?? 0;
            }
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });
            const listedCount = releases.filter(
              (release) => release.tag_name === process.env.TAG_NAME,
            ).length;
            core.setOutput("direct_status", String(directStatus));
            core.setOutput("listed_count", String(listedCount));

      - name: Publish existing draft with omitted input
        id: release_omitted
        if: matrix.scenario == 'omitted'
        continue-on-error: true
        uses: ./action-under-test
        with:
          tag_name: ${{ env.TAG_NAME }}
          prerelease: true
          files: ${{ env.ASSET_NAME }}

      - name: Publish existing draft with null expression
        id: release_null
        if: matrix.scenario == 'null'
        continue-on-error: true
        uses: ./action-under-test
        with:
          tag_name: ${{ env.TAG_NAME }}
          draft: ${{ null }}
          prerelease: true
          files: ${{ env.ASSET_NAME }}

      - name: Publish existing draft with explicit false
        id: release_false
        if: matrix.scenario == 'false'
        continue-on-error: true
        uses: ./action-under-test
        with:
          tag_name: ${{ env.TAG_NAME }}
          draft: false
          prerelease: true
          files: ${{ env.ASSET_NAME }}

      - name: Retain existing draft with explicit true
        id: release_true
        if: matrix.scenario == 'true'
        continue-on-error: true
        uses: ./action-under-test
        with:
          tag_name: ${{ env.TAG_NAME }}
          draft: true
          prerelease: true
          files: ${{ env.ASSET_NAME }}

      - name: Assert existing draft lifecycle
        if: always()
        uses: actions/github-script@v8
        env:
          ACTION_REPOSITORY: ${{ inputs.action_repository }}
          ACTION_REF: ${{ inputs.action_ref }}
          ASSET_NAME: ${{ env.ASSET_NAME }}
          EXPECTED_BEHAVIOR: ${{ inputs.expected_existing_draft_behavior }}
          INITIAL_RELEASE_ID: ${{ steps.seed.outputs.release_id }}
          LISTED_DRAFT_COUNT: ${{ steps.visibility.outputs.listed_count }}
          DIRECT_DRAFT_STATUS: ${{ steps.visibility.outputs.direct_status }}
          NULL_DRAFT_VALUE: ${{ null }}
          OMITTED_OUTCOME: ${{ steps.release_omitted.outcome }}
          NULL_OUTCOME: ${{ steps.release_null.outcome }}
          FALSE_OUTCOME: ${{ steps.release_false.outcome }}
          TRUE_OUTCOME: ${{ steps.release_true.outcome }}
          OMITTED_ID: ${{ steps.release_omitted.outputs.id }}
          NULL_ID: ${{ steps.release_null.outputs.id }}
          FALSE_ID: ${{ steps.release_false.outputs.id }}
          TRUE_ID: ${{ steps.release_true.outputs.id }}
          OMITTED_URL: ${{ steps.release_omitted.outputs.url }}
          NULL_URL: ${{ steps.release_null.outputs.url }}
          FALSE_URL: ${{ steps.release_false.outputs.url }}
          TRUE_URL: ${{ steps.release_true.outputs.url }}
          SCENARIO: ${{ matrix.scenario }}
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const scenario = process.env.SCENARIO;
            const selected = {
              omitted: { outcome: process.env.OMITTED_OUTCOME, id: process.env.OMITTED_ID, url: process.env.OMITTED_URL },
              null: { outcome: process.env.NULL_OUTCOME, id: process.env.NULL_ID, url: process.env.NULL_URL },
              false: { outcome: process.env.FALSE_OUTCOME, id: process.env.FALSE_ID, url: process.env.FALSE_URL },
              true: { outcome: process.env.TRUE_OUTCOME, id: process.env.TRUE_ID, url: process.env.TRUE_URL },
            }[scenario];
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });
            const matching = releases.filter((release) => release.tag_name === process.env.TAG_NAME);
            const release = matching.find(
              (candidate) => String(candidate.id) === process.env.INITIAL_RELEASE_ID,
            );
            const expectedDraft = scenario === "true";
            const assetNames = release?.assets.map((asset) => asset.name) ?? [];

            let directReleaseId = null;
            let directReleaseStatus = 200;
            try {
              const response = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: process.env.TAG_NAME,
              });
              directReleaseId = response.data.id;
            } catch (error) {
              directReleaseStatus = error.status ?? 0;
            }

            let tagRef = null;
            let tagTarget = null;
            try {
              const response = await github.rest.git.getRef({
                owner,
                repo,
                ref: `tags/${process.env.TAG_NAME}`,
              });
              tagRef = response.data.ref;
              tagTarget = response.data.object.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const fixedState =
              selected?.outcome === "success" &&
              matching.length === 1 &&
              String(release?.id) === process.env.INITIAL_RELEASE_ID &&
              selected?.id === process.env.INITIAL_RELEASE_ID &&
              selected?.url === release?.html_url &&
              release?.draft === expectedDraft &&
              release?.prerelease === true &&
              assetNames.includes(process.env.ASSET_NAME) &&
              (expectedDraft
                ? tagRef === null
                : directReleaseId === release?.id &&
                  tagRef === `refs/tags/${process.env.TAG_NAME}` &&
                  tagTarget === context.sha);

            const summary = {
              scenario,
              action_repository: process.env.ACTION_REPOSITORY,
              action_ref: process.env.ACTION_REF,
              expected_behavior: process.env.EXPECTED_BEHAVIOR,
              initial_release_id: Number(process.env.INITIAL_RELEASE_ID),
              final_release_id: release?.id ?? null,
              action_output_id: selected?.id || null,
              action_output_url: selected?.url || null,
              matching_release_count: matching.length,
              matching_release_ids: matching.map((candidate) => candidate.id),
              draft: release?.draft ?? null,
              prerelease: release?.prerelease ?? null,
              asset_names: assetNames,
              tag_ref: tagRef,
              tag_target: tagTarget,
              release_step_outcome: selected?.outcome ?? null,
              seeded_get_release_by_tag_status: Number(process.env.DIRECT_DRAFT_STATUS),
              seeded_listed_release_count: Number(process.env.LISTED_DRAFT_COUNT),
              null_input_value: scenario === "null" ? process.env.NULL_DRAFT_VALUE : undefined,
              final_get_release_by_tag_status: directReleaseStatus,
              fixed_state: fixedState,
            };

            await core.summary
              .addHeading(`Issue 795 ${scenario} summary`)
              .addCodeBlock(JSON.stringify(summary, null, 2), "json")
              .write();
            core.info(`ISSUE_795_RESULT=${JSON.stringify(summary)}`);

            if (process.env.EXPECTED_BEHAVIOR === "fixed" && !fixedState) {
              core.setFailed(`existing draft ${scenario} scenario did not satisfy the fixed lifecycle`);
            }
            if (process.env.EXPECTED_BEHAVIOR === "broken" && fixedState) {
              core.setFailed(`existing draft ${scenario} scenario unexpectedly satisfied the fixed lifecycle`);
            }

      - name: Cleanup scenario releases and tag
        if: always()
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const listMatchingReleases = async () => {
              const releases = await github.paginate(github.rest.repos.listReleases, {
                owner,
                repo,
                per_page: 100,
              });
              return releases.filter((release) => release.tag_name === process.env.TAG_NAME);
            };
            const isMissingRef = (error) =>
              error.status === 404 ||
              (error.status === 422 &&
                /Reference does not exist/i.test(
                  error.response?.data?.message ?? error.message,
                ));

            let remaining = [];
            for (let attempt = 1; attempt <= 5; attempt += 1) {
              remaining = await listMatchingReleases();
              if (remaining.length === 0) break;

              for (const release of remaining) {
                try {
                  await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id });
                } catch (error) {
                  if (error.status !== 404) throw error;
                }
              }

              if (attempt < 5) {
                await new Promise((resolve) => setTimeout(resolve, 1000));
              }
            }

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `tags/${process.env.TAG_NAME}`,
              });
            } catch (error) {
              if (!isMissingRef(error)) throw error;
            }


  verify-cleanup:
    name: verify existing-draft cleanup
    if: >-
      always() &&
      (inputs.run_case == 'all' || inputs.run_case == 'existing-draft')
    needs:
      - existing-draft
    runs-on: ubuntu-latest
    steps:
      - name: Remove and verify all scenario releases and tags
        uses: actions/github-script@v8
        env:
          TAG_SUFFIX: ${{ github.run_id }}-${{ github.run_attempt }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const scenarios = ["omitted", "null", "false", "true"];
            const tags = scenarios.map(
              (scenario) => `issue795-${scenario}-${process.env.TAG_SUFFIX}`,
            );
            const listMatchingReleases = async () => {
              const releases = await github.paginate(github.rest.repos.listReleases, {
                owner,
                repo,
                per_page: 100,
              });
              return releases.filter((release) => tags.includes(release.tag_name));
            };
            const isMissingRef = (error) =>
              error.status === 404 ||
              (error.status === 422 &&
                /Reference does not exist/i.test(
                  error.response?.data?.message ?? error.message,
                ));

            let remaining = [];
            for (let attempt = 1; attempt <= 10; attempt += 1) {
              remaining = await listMatchingReleases();
              for (const release of remaining) {
                try {
                  await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id });
                } catch (error) {
                  if (error.status !== 404) throw error;
                }
              }

              for (const tag of tags) {
                try {
                  await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
                } catch (error) {
                  if (!isMissingRef(error)) throw error;
                }
              }

              if (remaining.length === 0) break;
              if (attempt < 10) {
                await new Promise((resolve) => setTimeout(resolve, 2000));
              }
            }

            remaining = await listMatchingReleases();
            if (remaining.length !== 0) {
              throw new Error(
                `cleanup left releases ${remaining.map((release) => release.id).join(", ")}`,
              );
            }

            for (const tag of tags) {
              try {
                await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
                throw new Error(`cleanup left tag ${tag}`);
              } catch (error) {
                if (!isMissingRef(error)) throw error;
              }
            }
            core.info(`ISSUE_795_CLEANUP=${JSON.stringify({ tags, releases: [] })}`);

  retag-existing-release:
    name: retag existing release (${{ matrix.slot }})
    if: inputs.run_case == 'all' || inputs.run_case == 'retag-existing-release'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        slot: [1, 2, 3, 4, 5, 6, 7, 8]
    env:
      ASSET_NAME: issue-772-asset.txt
      TAG_NAME: issue772-${{ matrix.slot }}-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Enable requested iteration
        id: guard
        env:
          ITERATIONS: ${{ inputs.retag_iterations }}
          SLOT: ${{ matrix.slot }}
        run: |
          if [ "$SLOT" -le "$ITERATIONS" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out harness history
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check out action under test
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.action_repository }}
          ref: ${{ inputs.action_ref }}
          path: action-under-test

      - name: Resolve old and new tag targets
        if: steps.guard.outputs.enabled == 'true'
        id: commits
        run: |
          echo "old_sha=$(git rev-parse HEAD~1)" >> "$GITHUB_OUTPUT"
          echo "new_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Push moving tag at old commit
        if: steps.guard.outputs.enabled == 'true'
        env:
          OLD_SHA: ${{ steps.commits.outputs.old_sha }}
        run: |
          git tag "$TAG_NAME" "$OLD_SHA"
          git push origin "refs/tags/$TAG_NAME"

      - name: Seed published prerelease and asset
        if: steps.guard.outputs.enabled == 'true'
        id: seed
        uses: actions/github-script@v8
        env:
          ASSET_NAME: ${{ env.ASSET_NAME }}
          OLD_SHA: ${{ steps.commits.outputs.old_sha }}
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const seedContent = `seed content ${process.env.TAG_NAME}\n`;
            const { data: release } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: process.env.TAG_NAME,
              name: `Issue 772 seeded ${process.env.TAG_NAME}`,
              body: `Seed body for ${process.env.TAG_NAME}`,
              target_commitish: process.env.OLD_SHA,
              draft: false,
              prerelease: true,
              make_latest: "false",
            });
            const uploadUrl = release.upload_url.replace("{?name,label}", "");
            const endpoint = new URL(uploadUrl);
            endpoint.searchParams.set("name", process.env.ASSET_NAME);
            const payload = Buffer.from(seedContent, "utf8");
            const response = await github.request({
              method: "POST",
              url: endpoint.toString(),
              headers: {
                "content-length": String(payload.length),
                "content-type": "text/plain",
              },
              data: payload,
            });
            core.setOutput("release_id", String(release.id));
            core.setOutput("release_url", release.html_url);
            core.setOutput("seed_asset_id", String(response.data.id));
            core.setOutput("seed_content", seedContent);

      - name: Delete and recreate moving tag
        if: steps.guard.outputs.enabled == 'true'
        env:
          NEW_SHA: ${{ steps.commits.outputs.new_sha }}
        run: |
          git push origin ":refs/tags/$TAG_NAME"
          git tag -f "$TAG_NAME" "$NEW_SHA"
          git push origin "refs/tags/$TAG_NAME"

      - name: Record immediate release visibility
        if: steps.guard.outputs.enabled == 'true'
        id: visibility
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            let directStatus = 200;
            let directReleaseId = null;
            try {
              const response = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: process.env.TAG_NAME,
              });
              directReleaseId = response.data.id;
            } catch (error) {
              directStatus = error.status ?? 0;
            }
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });
            const matching = releases.filter(
              (release) => release.tag_name === process.env.TAG_NAME,
            );
            core.setOutput("direct_status", String(directStatus));
            core.setOutput("direct_release_id", directReleaseId ? String(directReleaseId) : "");
            core.setOutput("listed_release_ids", matching.map((release) => release.id).join(","));
            core.info(`ISSUE_772_VISIBILITY=${JSON.stringify({
              tag_name: process.env.TAG_NAME,
              direct_status: directStatus,
              direct_release_id: directReleaseId,
              listed_releases: matching.map((release) => ({
                id: release.id,
                draft: release.draft,
                prerelease: release.prerelease,
              })),
            })}`);

      - name: Prepare replacement asset
        if: steps.guard.outputs.enabled == 'true'
        run: |
          printf 'replacement content %s\n' "$TAG_NAME" > "$ASSET_NAME"

      - name: Update release after replacing tag
        if: steps.guard.outputs.enabled == 'true'
        id: release
        continue-on-error: true
        uses: ./action-under-test
        with:
          tag_name: ${{ env.TAG_NAME }}
          draft: false
          prerelease: true
          make_latest: false
          target_commitish: ${{ steps.commits.outputs.new_sha }}
          name: Issue 772 updated ${{ env.TAG_NAME }}
          body: Updated body for ${{ env.TAG_NAME }}
          files: ${{ env.ASSET_NAME }}

      - name: Inspect moving-tag result
        if: always() && steps.guard.outputs.enabled == 'true'
        uses: actions/github-script@v8
        env:
          ACTION_OUTPUT_ID: ${{ steps.release.outputs.id }}
          ACTION_OUTPUT_URL: ${{ steps.release.outputs.url }}
          ACTION_REF: ${{ inputs.action_ref }}
          ACTION_REPOSITORY: ${{ inputs.action_repository }}
          ASSET_NAME: ${{ env.ASSET_NAME }}
          DIRECT_BEFORE_ID: ${{ steps.visibility.outputs.direct_release_id }}
          DIRECT_BEFORE_STATUS: ${{ steps.visibility.outputs.direct_status }}
          EXPECTED_BEHAVIOR: ${{ inputs.expected_retag_behavior }}
          LISTED_BEFORE_IDS: ${{ steps.visibility.outputs.listed_release_ids }}
          NEW_SHA: ${{ steps.commits.outputs.new_sha }}
          OLD_SHA: ${{ steps.commits.outputs.old_sha }}
          RELEASE_OUTCOME: ${{ steps.release.outcome }}
          RESULT_FILE: issue-772-result-${{ matrix.slot }}.json
          SEED_ASSET_ID: ${{ steps.seed.outputs.seed_asset_id }}
          SEED_RELEASE_ID: ${{ steps.seed.outputs.release_id }}
          SEED_RELEASE_URL: ${{ steps.seed.outputs.release_url }}
          SLOT: ${{ matrix.slot }}
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");
            const { owner, repo } = context.repo;
            const tagName = process.env.TAG_NAME;
            const seedReleaseId = Number(process.env.SEED_RELEASE_ID);
            const expectedContent = `replacement content ${tagName}\n`;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });
            const matching = releases.filter((release) => release.tag_name === tagName);
            const seededRelease = matching.find((release) => release.id === seedReleaseId);
            let directStatus = 200;
            let directRelease = null;
            try {
              directRelease = (
                await github.rest.repos.getReleaseByTag({ owner, repo, tag: tagName })
              ).data;
            } catch (error) {
              directStatus = error.status ?? 0;
            }
            let tagTarget = null;
            try {
              tagTarget = (
                await github.rest.git.getRef({ owner, repo, ref: `tags/${tagName}` })
              ).data.object.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            const replacementAsset = seededRelease?.assets.find(
              (asset) => asset.name === process.env.ASSET_NAME,
            );
            let downloadedContent = null;
            if (replacementAsset) {
              const response = await github.request({
                method: "GET",
                url: replacementAsset.url,
                headers: { accept: "application/octet-stream" },
              });
              const data = response.data;
              const buffer = Buffer.isBuffer(data)
                ? data
                : data instanceof ArrayBuffer
                  ? Buffer.from(data)
                  : ArrayBuffer.isView(data)
                    ? Buffer.from(data.buffer, data.byteOffset, data.byteLength)
                    : Buffer.from(String(data), "utf8");
              downloadedContent = buffer.toString("utf8");
            }
            const fixedState =
              process.env.RELEASE_OUTCOME === "success" &&
              matching.length === 1 &&
              seededRelease?.id === seedReleaseId &&
              process.env.ACTION_OUTPUT_ID === String(seedReleaseId) &&
              process.env.ACTION_OUTPUT_URL === seededRelease?.html_url &&
              seededRelease?.draft === false &&
              seededRelease?.prerelease === true &&
              seededRelease?.name === `Issue 772 updated ${tagName}` &&
              seededRelease?.body === `Updated body for ${tagName}` &&
              seededRelease?.assets.length === 1 &&
              downloadedContent === expectedContent &&
              directRelease?.id === seedReleaseId &&
              tagTarget === process.env.NEW_SHA;
            const brokenState =
              !fixedState &&
              (process.env.RELEASE_OUTCOME === "failure" ||
                matching.length !== 1 ||
                process.env.ACTION_OUTPUT_ID !== String(seedReleaseId) ||
                seededRelease?.draft === true ||
                directRelease?.id !== seedReleaseId ||
                downloadedContent !== expectedContent);
            const summary = {
              slot: Number(process.env.SLOT),
              tag_name: tagName,
              action_repository: process.env.ACTION_REPOSITORY,
              action_ref: process.env.ACTION_REF,
              expected_behavior: process.env.EXPECTED_BEHAVIOR,
              old_sha: process.env.OLD_SHA,
              new_sha: process.env.NEW_SHA,
              initial_release_id: seedReleaseId,
              initial_release_url: process.env.SEED_RELEASE_URL,
              initial_asset_id: Number(process.env.SEED_ASSET_ID),
              immediate_direct_status: Number(process.env.DIRECT_BEFORE_STATUS),
              immediate_direct_release_id: process.env.DIRECT_BEFORE_ID
                ? Number(process.env.DIRECT_BEFORE_ID)
                : null,
              immediate_listed_release_ids: process.env.LISTED_BEFORE_IDS
                ? process.env.LISTED_BEFORE_IDS.split(",").map(Number)
                : [],
              action_outcome: process.env.RELEASE_OUTCOME,
              action_output_id: process.env.ACTION_OUTPUT_ID || null,
              action_output_url: process.env.ACTION_OUTPUT_URL || null,
              final_direct_status: directStatus,
              final_direct_release_id: directRelease?.id ?? null,
              matching_release_count: matching.length,
              releases: matching.map((release) => ({
                id: release.id,
                draft: release.draft,
                prerelease: release.prerelease,
                name: release.name,
                body: release.body,
                asset_ids: release.assets.map((asset) => asset.id),
                asset_names: release.assets.map((asset) => asset.name),
              })),
              replacement_asset_id: replacementAsset?.id ?? null,
              replacement_content_matches: downloadedContent === expectedContent,
              tag_target: tagTarget,
              fixed_state: fixedState,
              broken_state: brokenState,
              cleanup: null,
            };
            fs.writeFileSync(process.env.RESULT_FILE, `${JSON.stringify(summary, null, 2)}\n`);
            await core.summary
              .addHeading(`Issue 772 retag iteration ${process.env.SLOT}`)
              .addCodeBlock(JSON.stringify(summary, null, 2), "json")
              .write();
            core.info(`ISSUE_772_RESULT=${JSON.stringify(summary)}`);
            if (process.env.EXPECTED_BEHAVIOR === "fixed" && !fixedState) {
              core.setFailed("retagged release did not satisfy the fixed lifecycle");
            }

      - name: Cleanup moving-tag release and tag
        if: always() && steps.guard.outputs.enabled == 'true'
        uses: actions/github-script@v8
        env:
          RESULT_FILE: issue-772-result-${{ matrix.slot }}.json
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");
            const { owner, repo } = context.repo;
            const tagName = process.env.TAG_NAME;
            const listMatches = async () => {
              const releases = await github.paginate(github.rest.repos.listReleases, {
                owner,
                repo,
                per_page: 100,
              });
              return releases.filter((release) => release.tag_name === tagName);
            };
            const isMissingRef = (error) =>
              error.status === 404 ||
              (error.status === 422 &&
                /Reference does not exist/i.test(
                  error.response?.data?.message ?? error.message,
                ));
            let matches = await listMatches();
            for (let attempt = 1; matches.length > 0 && attempt <= 10; attempt += 1) {
              for (const release of matches) {
                try {
                  await github.rest.repos.deleteRelease({
                    owner,
                    repo,
                    release_id: release.id,
                  });
                } catch (error) {
                  if (error.status !== 404) throw error;
                }
              }
              if (attempt < 10) {
                await new Promise((resolve) => setTimeout(resolve, 1000));
              }
              matches = await listMatches();
            }
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tagName}` });
            } catch (error) {
              if (!isMissingRef(error)) throw error;
            }
            const remainingReleases = await listMatches();
            let tagExists = false;
            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tagName}` });
              tagExists = true;
            } catch (error) {
              if (!isMissingRef(error)) throw error;
            }
            const cleanup = {
              releases_remaining: remainingReleases.map((release) => release.id),
              tag_exists: tagExists,
              complete: remainingReleases.length === 0 && !tagExists,
            };
            const result = fs.existsSync(process.env.RESULT_FILE)
              ? JSON.parse(fs.readFileSync(process.env.RESULT_FILE, "utf8"))
              : { tag_name: tagName, fixed_state: false, broken_state: true };
            result.cleanup = cleanup;
            fs.writeFileSync(process.env.RESULT_FILE, `${JSON.stringify(result, null, 2)}\n`);
            core.info(`ISSUE_772_CLEANUP=${JSON.stringify({ tag_name: tagName, ...cleanup })}`);
            if (!cleanup.complete) {
              core.setFailed(`cleanup incomplete for ${tagName}`);
            }

      - name: Upload moving-tag result
        if: always() && steps.guard.outputs.enabled == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: issue-772-result-${{ matrix.slot }}
          path: issue-772-result-${{ matrix.slot }}.json

  summarize-retag-existing-release:
    name: summarize retag existing release
    if: >-
      always() &&
      (inputs.run_case == 'all' || inputs.run_case == 'retag-existing-release')
    needs:
      - retag-existing-release
    runs-on: ubuntu-latest
    steps:
      - name: Download moving-tag results
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: issue-772-results
          pattern: issue-772-result-*

      - name: Aggregate moving-tag evidence
        uses: actions/github-script@v8
        env:
          ACTION_REF: ${{ inputs.action_ref }}
          ACTION_REPOSITORY: ${{ inputs.action_repository }}
          EXPECTED_BEHAVIOR: ${{ inputs.expected_retag_behavior }}
          EXPECTED_ITERATIONS: ${{ inputs.retag_iterations }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const resultDir = path.join(process.env.GITHUB_WORKSPACE, "issue-772-results");
            const results = fs.readdirSync(resultDir)
              .filter((file) => file.endsWith(".json"))
              .sort((left, right) =>
                Number(left.match(/(\d+)/)?.[1] ?? 0) - Number(right.match(/(\d+)/)?.[1] ?? 0),
              )
              .map((file) => JSON.parse(fs.readFileSync(path.join(resultDir, file), "utf8")));
            const fixedCount = results.filter((result) => result.fixed_state).length;
            const brokenCount = results.filter((result) => result.broken_state).length;
            const cleanupCount = results.filter((result) => result.cleanup?.complete).length;
            const summary = {
              action_repository: process.env.ACTION_REPOSITORY,
              action_ref: process.env.ACTION_REF,
              expected_behavior: process.env.EXPECTED_BEHAVIOR,
              expected_iterations: Number(process.env.EXPECTED_ITERATIONS),
              observed_iterations: results.length,
              fixed_count: fixedCount,
              broken_count: brokenCount,
              cleanup_count: cleanupCount,
              tags: results.map((result) => result.tag_name),
              initial_release_ids: results.map((result) => result.initial_release_id),
              final_release_ids: results.map((result) => result.final_direct_release_id),
              results,
            };
            await core.summary
              .addHeading("Issue 772 moving-tag aggregate")
              .addCodeBlock(JSON.stringify(summary, null, 2), "json")
              .write();
            core.info(`ISSUE_772_AGGREGATE=${JSON.stringify(summary)}`);
            if (results.length !== Number(process.env.EXPECTED_ITERATIONS)) {
              core.setFailed(
                `expected ${process.env.EXPECTED_ITERATIONS} results, found ${results.length}`,
              );
              return;
            }
            if (cleanupCount !== results.length) {
              core.setFailed("one or more moving-tag iterations did not clean up completely");
              return;
            }
            if (process.env.EXPECTED_BEHAVIOR === "fixed" && fixedCount !== results.length) {
              core.setFailed(`expected every iteration fixed, observed ${fixedCount}/${results.length}`);
              return;
            }
            if (process.env.EXPECTED_BEHAVIOR === "broken" && brokenCount === 0) {
              core.setFailed("expected at least one broken moving-tag iteration, observed none");
            }
