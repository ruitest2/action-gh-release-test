name: repro-draft-false
run-name: repro-draft-false-${{ inputs.action_ref }}

on:
  workflow_dispatch:
    inputs:
      action_repository:
        description: Action repository to check out
        required: true
        default: softprops/action-gh-release
      action_ref:
        description: Action ref to test
        required: true
        default: master

permissions:
  contents: write

jobs:
  repro:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: prerelease-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.action_repository }}
          ref: ${{ inputs.action_ref }}
          path: action-under-test

      - name: Prepare asset
        run: |
          printf 'draft false repro %s\n' "$TAG_NAME" > draft-false.txt

      - name: Attempt release
        id: release
        continue-on-error: true
        uses: ./action-under-test
        with:
          tag_name: ${{ env.TAG_NAME }}
          draft: false
          prerelease: true
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          files: draft-false.txt

      - name: Assert release was published with the uploaded asset
        if: always()
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
          RELEASE_OUTCOME: ${{ steps.release.outcome }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag: process.env.TAG_NAME,
            });
            const summary = {
              tag_name: process.env.TAG_NAME,
              step_outcome: process.env.RELEASE_OUTCOME,
              draft: release.draft,
              prerelease: release.prerelease,
              asset_names: release.assets.map((asset) => asset.name),
            };

            core.summary
              .addHeading("Draft false summary")
              .addCodeBlock(JSON.stringify(summary, null, 2), "json")
              .write();

            if (
              stepOutcome !== "success" ||
              release.draft ||
              !release.prerelease ||
              !release.assets.some((asset) => asset.name === "draft-false.txt")
            ) {
              core.setFailed(
                "release did not finish as a published prerelease with the uploaded asset",
              );
            }

      - name: Cleanup release and tag
        if: always()
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: process.env.TAG_NAME,
              });
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.id,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }
            try {
              await github.request("DELETE /repos/{owner}/{repo}/git/refs/{ref}", {
                owner,
                repo,
                ref: `tags/${process.env.TAG_NAME}`,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }
